apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-api
  namespace: forge-system
  labels:
    app.kubernetes.io/name: forge-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: forge
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: kustomize
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "FORGE FastAPI service"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600

  selector:
    matchLabels:
      app.kubernetes.io/name: forge-api
      app.kubernetes.io/component: api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: forge
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        # Force pod restart when configmap changes
        checksum/config: "placeholder-updated-by-kustomize"

    spec:
      # Security context for the pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Service account
      serviceAccountName: forge-api

      # Graceful shutdown
      terminationGracePeriodSeconds: 60

      # Image pull policy
      imagePullSecrets:
        - name: forge-registry-credentials

      # Init containers: run migrations before starting API
      initContainers:
        - name: migrate
          image: forge-api:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: forge-config
            - secretRef:
                name: forge-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: forge-api
          image: forge-api:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Load config from ConfigMap and Secrets
          envFrom:
            - configMapRef:
                name: forge-config
            - secretRef:
                name: forge-secrets

          # Override specific values if needed
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # Resource limits
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Liveness probe: restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # Readiness probe: remove from LB if not ready
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # Startup probe: give extra time on first start
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30

          # Security context for the container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]

          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs

          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "100Mi"
        - name: app-logs
          emptyDir:
            sizeLimit: "500Mi"

      # Node affinity: prefer nodes labeled for compute workloads
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - forge-api
                topologyKey: kubernetes.io/hostname

      # Topology spread
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: forge-api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-api
  namespace: forge-system
  labels:
    app.kubernetes.io/name: forge-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: forge
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: forge-api-pdb
  namespace: forge-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-api
      app.kubernetes.io/component: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: forge-api-hpa
  namespace: forge-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: forge-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
