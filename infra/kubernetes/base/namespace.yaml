apiVersion: v1
kind: Namespace
metadata:
  name: forge-system
  labels:
    name: forge-system
    app.kubernetes.io/name: forge
    app.kubernetes.io/part-of: forge
    environment: production
    managed-by: kustomize
  annotations:
    description: "FORGE - Autonomous Software Production System"
    contact: "platform@forge.dev"
    # ResourceQuota and LimitRange are defined separately
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: forge-resource-quota
  namespace: forge-system
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "100"
    services: "20"
    persistentvolumeclaims: "20"
    secrets: "50"
    configmaps: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: forge-limit-range
  namespace: forge-system
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "100Gi"
      min:
        storage: "1Gi"
