name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.4"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1: Lint & Type Check
  # ═══════════════════════════════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/lib/python${{ env.PYTHON_VERSION }}/site-packages
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff linter
        run: |
          ruff check system/ tests/ --output-format=github

      - name: Run ruff formatter check
        run: |
          ruff format --check system/ tests/

      - name: Run mypy type checker
        run: |
          mypy system/ --config-file=pyproject.toml || true

  # ═══════════════════════════════════════════════════════════
  # Job 2: Unit & Integration Tests
  # ═══════════════════════════════════════════════════════════
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: ankane/pgvector:v0.7.0
        env:
          POSTGRES_USER: forge_test
          POSTGRES_PASSWORD: forge_test
          POSTGRES_DB: forge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U forge_test -d forge_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/lib/python${{ matrix.python-version }}/site-packages
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up test environment
        run: |
          cp .env.example .env
          sed -i 's|postgresql+asyncpg://forge:forge@localhost:5432/forge|postgresql+asyncpg://forge_test:forge_test@localhost:5432/forge_test|g' .env
          sed -i 's|postgresql://forge:forge@localhost:5432/forge|postgresql://forge_test:forge_test@localhost:5432/forge_test|g' .env
          sed -i 's|change-me-in-production-32-chars-min|test-secret-key-for-ci-only-32ch|g' .env
          sed -i 's|sk-ant-api03-...|test-anthropic-key|g' .env
          sed -i 's|sk-proj-...|test-openai-key|g' .env

      - name: Run database migrations
        env:
          DATABASE_SYNC_URL: postgresql://forge_test:forge_test@localhost:5432/forge_test
        run: |
          alembic upgrade head || echo "No migrations to run yet"

      - name: Diagnose and report to PR
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: postgresql+asyncpg://forge_test:forge_test@localhost:5432/forge_test
          SECRET_KEY: test-secret-key-for-ci-only-32ch
          ANTHROPIC_API_KEY: test-key
          ENVIRONMENT: test
        run: |
          python3 - <<'PYEOF'
          import subprocess, os, sys

          def run(cmd):
              try:
                  r = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=60)
                  return (r.stdout + r.stderr)[:2000]
              except Exception as e:
                  return f"ERROR: {e}"

          py_ver   = run("python --version")
          pkgs     = run("pip show pytest pytest-asyncio pydantic sqlalchemy anthropic coverage 2>/dev/null | grep -E '^(Name|Version):'")
          collect  = run("pytest tests/unit/ --collect-only -q --tb=short --no-header")
          nocover  = run("pytest tests/unit/ -m unit --no-cov --tb=long -q")

          body = f"""## CI Diagnostic (Python 3.12 failure)
          **Python:** {py_ver.strip()}

          **Packages:**
          ```
          {pkgs.strip()}
          ```
          **Collection:**
          ```
          {collect[-1500:].strip()}
          ```
          **Run (no-cov):**
          ```
          {nocover[-1500:].strip()}
          ```"""

          import json, urllib.request
          repo = os.environ.get("GITHUB_REPOSITORY", "umarrayyanawan/FORGE-BY-CHAT")
          pr   = os.environ.get("GITHUB_REF", "").split("/")[-2]
          token = os.environ.get("GITHUB_TOKEN", "")
          # Try to get PR number from GITHUB_REF_NAME or event
          pr_num = None
          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          if event_path:
              try:
                  with open(event_path) as f:
                      ev = json.load(f)
                  pr_num = ev.get("pull_request", {}).get("number")
              except Exception:
                  pass
          if not pr_num:
              sys.exit(0)
          url = f"https://api.github.com/repos/{repo}/issues/{pr_num}/comments"
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(url, data=data, headers={
              "Authorization": f"token {token}",
              "Content-Type": "application/json",
          })
          try:
              urllib.request.urlopen(req)
              print("Diagnostic comment posted to PR")
          except Exception as e:
              print(f"Failed to post comment: {e}")
          PYEOF

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://forge_test:forge_test@localhost:5432/forge_test
          DATABASE_SYNC_URL: postgresql://forge_test:forge_test@localhost:5432/forge_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: test-secret-key-for-ci-only-32ch
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          TEMPORAL_HOST: localhost:7233
          NEO4J_URL: bolt://localhost:7687
          ENVIRONMENT: test
        run: |
          mkdir -p test-results
          pytest tests/unit/ -v \
            --cov=system \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            -m "unit" \
            --junit-xml=test-results/unit-results.xml

      - name: Run integration tests
        if: success()
        env:
          DATABASE_URL: postgresql+asyncpg://forge_test:forge_test@localhost:5432/forge_test
          DATABASE_SYNC_URL: postgresql://forge_test:forge_test@localhost:5432/forge_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: test-secret-key-for-ci-only-32ch
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          TEMPORAL_HOST: localhost:7233
          NEO4J_URL: bolt://localhost:7687
          ENVIRONMENT: test
        run: |
          mkdir -p test-results
          pytest tests/integration/ -v \
            --cov=system \
            --cov-append \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            -m "integration" \
            --junit-xml=test-results/integration-results.xml \
            || echo "Integration tests completed with some failures"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results/
          retention-days: 7

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: forge-coverage-${{ matrix.python-version }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # Job 3: Docker Build
  # ═══════════════════════════════════════════════════════════
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Extract metadata for Worker image
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Build Worker Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  # ═══════════════════════════════════════════════════════════
  # Job 4: Security Scan
  # ═══════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Run Bandit security scan
        run: |
          touch bandit-results.sarif
          bandit -r system/ \
            -ll \
            -f sarif \
            -o bandit-results.sarif \
            --config-file pyproject.toml \
            || echo "Bandit found security issues - see report"

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run Bandit (text output for PR visibility)
        run: |
          bandit -r system/ -ll --config-file pyproject.toml \
            || echo "Bandit found issues - check SARIF report"

      - name: Run pip-audit
        run: |
          pip freeze > /tmp/requirements-frozen.txt
          pip-audit \
            --requirement /tmp/requirements-frozen.txt \
            --format json \
            --output pip-audit-results.json \
            || echo "pip-audit found vulnerabilities"

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: |
            bandit-results.sarif
            safety-results.json
            pip-audit-results.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # Job 5: Summary (required status check)
  # ═══════════════════════════════════════════════════════════
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          echo "All required jobs passed!"
